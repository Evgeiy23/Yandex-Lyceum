{% extends "base.html" %}

{% block content %}
<div class="container">
    <h2 class="text-center mt-4">Пейзажи Марса</h2>
    
    <div id="marsCarousel" class="carousel slide mt-4" data-bs-ride="carousel" style="max-width: 800px; margin: 0 auto;">
      <div class="carousel-inner">
        {% for img in images %}
          <div class="carousel-item {{ 'active' if loop.first else '' }}">
            <img src="{{ url_for('static', filename='img/' + img) }}" class="d-block w-100" alt="Landscape">
          </div>
        {% endfor %}
      </div>
      <button class="carousel-control-prev" type="button" data-bs-target="#marsCarousel" data-bs-slide="prev">
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Previous</span>
      </button>
      <button class="carousel-control-next" type="button" data-bs-target="#marsCarousel" data-bs-slide="next">
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Next</span>
      </button>
    </div>

    <div class="card mt-5 mx-auto" style="max-width: 500px;">
        <div class="card-body">
            <h5 class="card-title">Добавить картинку</h5>
            <form method="post" enctype="multipart/form-data">
                <div class="mb-3">
                    <input class="form-control" type="file" name="file" required>
                </div>
                <button type="submit" class="btn btn-primary">Отправить</button>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
{% endblock %}
