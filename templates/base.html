<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css"
          integrity="sha384-eOJMYsd53ii+scO/bJGFsiCZc+5NDVN2yr8+0RDqr0Ql0h+rP48ckxlpbzKgwra6"
          crossorigin="anonymous">
    <title>{{ title }}</title>
</head>
<body>
<header>
    <nav class="navbar navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Миссия Колонизация Марса</a>
            <div class="navbar-nav flex-row">
                {% if current_user.is_authenticated %}
                <span class="navbar-text me-3">{{ current_user.surname }} {{ current_user.name }}</span>
                <a class="nav-link" href="/logout">Logout</a>
                {% else %}
                <a class="nav-link me-3" href="/register">Register</a>
                <a class="nav-link" href="/login">Login</a>
                {% endif %}
            </div>
            <span class="navbar-text">Mars One</span>
        </div>
    </nav>
</header>
<main role="main" class="container">
    {% block content %}{% endblock %}
</main>
</body>
</html>
