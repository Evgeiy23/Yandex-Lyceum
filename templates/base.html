<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css">
    <title>{{ title }}</title>
</head>
<body>
<header>
    <nav class="navbar navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Миссия Колонизация Марса</a>
            <div class="navbar-nav flex-row ms-auto me-3">
                {% if current_user.is_authenticated %}
                <a class="nav-link" href="/logout">{{ current_user.surname }} {{ current_user.name }}</a>
                {% else %}
                <a class="btn btn-primary me-2" href="/register">Register</a>
                <a class="btn btn-success" href="/login">Log in</a>
                {% endif %}
            </div>
            <span class="navbar-text">Mars One</span>
        </div>
    </nav>
</header>
<main class="container">
    {% block content %}{% endblock %}
</main>
</body>
</html>
