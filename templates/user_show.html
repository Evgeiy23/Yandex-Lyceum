{% extends "base.html" %}

{% block content %}
<h2 class="text-secondary mt-3" style="font-style: italic; color: #ccc !important;">And apple trees will bloom on Mars!</h2>
<div class="text-center mt-4">
    <h1>Nostalgy</h1>
    <h2>{{ user.name }} {{ user.surname }}</h2>
    <h3>Hometown {{ user.city_from }}</h3>

    </div>
</div>
{% endblock %}
